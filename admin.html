<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>后台管理 - 横渠网</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="dash-header"><div class="inner">
    <a href="/"><img src="assets/footer-logo.png" alt="横渠网"></a><h1>后台管理</h1>
    <nav><a href="/">网站首页</a><a href="/account">用户中心</a><button id="logoutButton">退出</button></nav>
  </div></header>
  <main class="page">
    <section class="welcome"><div><h2>运营数据</h2><p>管理预约、需求和咨询状态</p></div></section>
    <section class="cards" id="metrics"></section>
    <section class="panel"><div class="panel-head"><h3>预约订单</h3></div><div class="table-wrap" id="reservationTable"></div></section>
    <section class="panel"><div class="panel-head"><h3>定制需求</h3></div><div class="table-wrap" id="demandTable"></div></section>
    <section class="panel"><div class="panel-head"><h3>在线咨询</h3></div><div class="table-wrap" id="inquiryTable"></div></section>
  </main>
  <div class="toast"></div>
  <script src="admin.js"></script>
</body>
</html>
